description = "KIS 한국투자증권 인증 (모의/실전/WebSocket/전환)"

prompt = """
KIS 인증을 수행해주세요. {{args}}

1. 먼저 `pwd`로 프로젝트 루트를 확인한다.
2. `uv run <프로젝트루트>/.gemini/scripts/auth.py`를 실행하여 현재 인증 상태를 확인한다.
3. 인자에 따라 `uv run <프로젝트루트>/.gemini/scripts/do_auth.py <인자>`를 실행한다:
   - `vps` 또는 `모의` → 모의투자 REST 인증
   - `prod` 또는 `실전` → 실전투자 REST 인증 (사용자 확인 필수)
   - `ws vps` → 모의투자 WebSocket 인증
   - `ws prod` → 실전투자 WebSocket 인증
   - `switch` 또는 `전환` → 현재 모드 반대로 전환
   - 인자 없음 → 현재 상태만 보여주고 사용자에게 질문
4. 결과 JSON의 `success`를 확인하고 `mode_display`, `expires`를 안내한다.
5. 토큰, 앱키, 시크리트 등 민감 정보는 절대 출력하지 않는다.
"""
